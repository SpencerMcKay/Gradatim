<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>gradatim</title>
  <!-- Fonts load from Google CDN when online; the CSS stack falls back gracefully offline -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent-h: 240;
      --accent-c: 0;
      --accent: oklch(0.90 calc(var(--accent-c) * 1.0) var(--accent-h));
      --accent-bright: oklch(0.97 calc(var(--accent-c) * 1.0) var(--accent-h));
      --accent-dim: oklch(0.70 calc(var(--accent-c) * 0.75) var(--accent-h));
      --accent-faint: oklch(0.52 calc(var(--accent-c) * 0.5) var(--accent-h));
      --accent-ghost: oklch(0.90 calc(var(--accent-c) * 1.0) var(--accent-h) / 0.08);
      --accent-ghost-2: oklch(0.90 calc(var(--accent-c) * 1.0) var(--accent-h) / 0.16);
      --bg-0: oklch(0.09 0 0);
      --bg-1: oklch(0.12 0 0);
      --bg-2: oklch(0.15 0 0);
      --bg-3: oklch(0.20 0 0);
      --fg: oklch(0.94 0 0);
      --fg-mute: oklch(0.68 0 0);
      --fg-dim: oklch(0.48 0 0);
      --fg-faint: oklch(0.34 0 0);
      --warn: oklch(0.80 0.14 55);
      --line: oklch(0.26 0 0);
      --line-soft: oklch(0.20 0 0);
      --font-sans: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
      --fs-base: 13px;
      --fs-sm: 11.5px;
      --fs-xs: 10.5px;
      --pad: 18px;
    }
    .density-compact { --fs-base: 12px; --fs-sm: 10.5px; --fs-xs: 9.5px; --pad: 12px; }
    .density-comfy   { --fs-base: 14px; --fs-sm: 12.5px; --fs-xs: 11.5px; --pad: 22px; }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: black; }
    body {
      font-family: var(--font-sans);
      font-size: var(--fs-base);
      color: var(--fg);
      background: var(--bg-0);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      letter-spacing: 0.005em;
    }

    .accent { color: var(--accent); }
    .dim { color: var(--fg-dim); }
    .mute { color: var(--fg-mute); }
    .warn { color: var(--warn); }
    .small { font-size: var(--fs-xs); }
    .mono-tight { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

    .app {
      position: relative;
      height: 100vh;
      display: grid;
      grid-template-rows: 44px 1fr 24px;
      isolation: isolate;
    }
    .app::before {
      content: "";
      position: absolute; inset: 0; z-index: -2;
      background:
        radial-gradient(ellipse 70% 50% at 50% 45%, oklch(0.16 calc(var(--accent-c) * 0.5) var(--accent-h)) 0%, transparent 65%),
        var(--bg-0);
    }
    .app.vignette { box-shadow: inset 0 0 200px rgba(0,0,0,0.6); }
    .app.scanlines > main::before {
      content: "";
      position: absolute; inset: 0; pointer-events: none; z-index: 5;
      background: repeating-linear-gradient(to bottom, transparent 0, transparent 2px, oklch(0.92 var(--accent-c) var(--accent-h) / 0.025) 2px, oklch(0.92 var(--accent-c) var(--accent-h) / 0.025) 3px);
      mix-blend-mode: screen;
    }
    .app.noise > main::after {
      content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 6;
      opacity: 0.025;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.7'/></svg>");
      background-size: 160px 160px;
      mix-blend-mode: overlay;
    }

    .top {
      display: flex; align-items: center; gap: 18px;
      padding: 0 var(--pad);
      border-bottom: 1px solid var(--line-soft);
      font-size: var(--fs-sm);
    }
    .logo { display: flex; align-items: center; gap: 9px; min-width: 140px; }
    .logo-mark {
      color: var(--fg); font-size: 14px;
      text-shadow: 0 0 10px oklch(0.94 var(--accent-c) var(--accent-h) / 0.5);
      animation: spin 22s linear infinite;
      display: inline-block; opacity: 0.85;
    }
    .logo-name {
      font-family: var(--font-mono); font-weight: 500;
      letter-spacing: 0.06em; color: var(--fg); font-size: 12.5px;
    }
    @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }

    .crumb { flex: 1; display: flex; align-items: center; gap: 4px; overflow: hidden; font-family: var(--font-mono); font-size: var(--fs-sm); }
    .crumb-seg {
      appearance: none; background: none; border: 0;
      color: var(--fg-mute); font: inherit; cursor: pointer;
      padding: 3px 6px; border-radius: 3px;
      transition: color 0.12s, background 0.12s;
    }
    .crumb-seg:hover { color: var(--accent); background: var(--accent-ghost); }
    .crumb-seg.is-cur { color: var(--accent-bright); }
    .crumb-slash { color: var(--fg-faint); }

    .top-actions { display: flex; gap: 6px; }
    .ghost-btn {
      appearance: none; background: transparent;
      border: 1px solid var(--line);
      color: var(--fg-mute); font: inherit; font-size: var(--fs-xs);
      padding: 5px 12px; border-radius: 3px; cursor: pointer;
      letter-spacing: 0.04em; transition: all 0.12s;
    }
    .ghost-btn:hover { color: var(--accent); border-color: var(--accent-dim); background: var(--accent-ghost); }
    .ghost-btn.wide { width: 100%; padding: 6px 10px; }

    .main {
      position: relative;
      display: grid;
      grid-template-columns: 280px 1fr 340px;
      overflow: hidden;
      transition: grid-template-columns 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .main.no-left  { grid-template-columns: 36px 1fr 340px; }
    .main.no-right { grid-template-columns: 280px 1fr 36px; }
    .main.no-left.no-right { grid-template-columns: 36px 1fr 36px; }
    .density-compact .main { grid-template-columns: 240px 1fr 300px; }
    .density-compact .main.no-left { grid-template-columns: 30px 1fr 300px; }
    .density-compact .main.no-right { grid-template-columns: 240px 1fr 30px; }
    .density-compact .main.no-left.no-right { grid-template-columns: 30px 1fr 30px; }
    .density-comfy .main { grid-template-columns: 320px 1fr 380px; }
    .density-comfy .main.no-left { grid-template-columns: 40px 1fr 380px; }
    .density-comfy .main.no-right { grid-template-columns: 320px 1fr 40px; }
    .density-comfy .main.no-left.no-right { grid-template-columns: 40px 1fr 40px; }

    .pane { position: relative; display: flex; flex-direction: column; min-width: 0; min-height: 0; overflow: hidden; z-index: 1; }
    .pane-l { border-right: 1px solid var(--line-soft); }
    .pane-r { border-left: 1px solid var(--line-soft); }
    .pane-c { position: relative; }

    .pane-collapse {
      position: absolute; top: 12px;
      width: 18px; height: 24px;
      appearance: none; background: var(--bg-1);
      border: 1px solid var(--line-soft);
      color: var(--fg-dim); cursor: pointer; font-size: 12px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.12s; z-index: 4;
    }
    .pane-collapse:hover { color: var(--accent); border-color: var(--accent-dim); }
    .pane-collapse.left { right: -1px; border-radius: 3px 0 0 3px; border-right: 0; }
    .pane-collapse.right { left: -1px; border-radius: 0 3px 3px 0; border-left: 0; }

    .pane-rail {
      appearance: none; background: var(--bg-0); border: 0;
      border-right: 1px solid var(--line-soft);
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      padding: 14px 0; gap: 12px; color: var(--fg-mute);
      transition: background 0.12s, color 0.12s;
    }
    .pane-rail.right { border-right: 0; border-left: 1px solid var(--line-soft); }
    .pane-rail:hover { color: var(--accent); background: var(--accent-ghost); }
    .pane-rail-chev { font-size: 14px; color: var(--accent-dim); }
    .pane-rail:hover .pane-rail-chev { color: var(--accent); }
    .pane-rail-label {
      writing-mode: vertical-rl; transform: rotate(180deg);
      font-family: var(--font-mono); font-size: var(--fs-xs);
      letter-spacing: 0.18em; text-transform: uppercase;
    }
    .pane-rail.right .pane-rail-label { transform: none; }

    .pane-hd {
      display: flex; align-items: baseline; gap: 10px;
      padding: 14px var(--pad) 12px;
      font-family: var(--font-mono); font-size: var(--fs-xs);
      color: var(--fg-mute); text-transform: uppercase; letter-spacing: 0.16em;
      border-bottom: 1px solid var(--line-soft);
    }
    .pane-hd-name { color: var(--fg); }
    .pane-hd-meta { color: var(--fg-dim); margin-left: auto; letter-spacing: 0.04em; text-transform: none; }

    .tree { display: flex; flex-direction: column; flex: 1; min-height: 0; }
    .tree-body { overflow-y: auto; padding: 8px 0 12px; flex: 1; }
    .tree-row {
      display: flex; align-items: center; gap: 6px;
      padding-right: var(--pad); height: 26px; cursor: pointer;
      font-size: var(--fs-sm); color: var(--fg-mute);
      border-left: 2px solid transparent; transition: background 0.1s;
    }
    .tree-row:hover { background: var(--accent-ghost); color: var(--fg); }
    .tree-row.is-focus {
      background: oklch(0.94 var(--accent-c) var(--accent-h) / 0.10);
      color: var(--accent-bright); border-left-color: var(--accent);
    }
    .tree-disc {
      appearance: none; background: none; border: 0;
      color: var(--fg-dim); font-family: var(--font-mono); font-size: 12px;
      width: 14px; height: 14px; padding: 0; cursor: pointer;
      display: flex; align-items: center; justify-content: center; border-radius: 2px;
    }
    .tree-row:hover .tree-disc { color: var(--accent); }
    .tree-row.is-focus .tree-disc { color: var(--accent-bright); }
    .tree-name { flex: 1; }
    .tree-pct { color: var(--accent-dim); font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: var(--fs-xs); }
    .tree-pct-unit { opacity: 0.55; margin-left: 1px; }
    .tree-row.is-focus .tree-pct { color: var(--accent-bright); }
    .tree-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
      margin-left: 2px;
    }

    .viz-wrap {
      flex: 1; position: relative;
      display: flex; align-items: center; justify-content: center;
      min-height: 0; padding: 24px;
    }
    .viz-svg { width: 100%; height: 100%; max-width: 720px; max-height: calc(100vh - 100px); display: block; }
    .viz-slice { cursor: pointer; transition: transform 0.18s cubic-bezier(0.4, 0, 0.2, 1); transform-origin: center; }
    .viz-slice:hover { transform: scale(1.018); }
    .viz-frag { cursor: pointer; transition: transform 0.18s; transform-origin: center; }
    .viz-frag:hover { transform: scale(1.15); }

    .viz-core-pct {
      fill: var(--accent-bright);
      font-family: var(--font-mono); font-weight: 500;
      font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
      filter: drop-shadow(0 0 12px oklch(0.94 var(--accent-c) var(--accent-h) / 0.55));
    }
    .viz-core-name { fill: var(--fg); font-family: var(--font-mono); letter-spacing: 0.10em; text-transform: uppercase; }

    .viz-pulse { animation: viz-pulse var(--pulse-dur, 3.6s) ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .viz-pulse-strong { animation: viz-pulse-strong var(--pulse-dur, 3.6s) ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    @keyframes viz-pulse { 0%, 100% { opacity: 0.55; transform: scale(1); } 50% { opacity: 1; transform: scale(1.012); } }
    @keyframes viz-pulse-strong { 0%, 100% { opacity: 0.45; transform: scale(1); } 50% { opacity: 0.95; transform: scale(1.04); } }

    .viz-hover {
      position: absolute; top: 28px; left: 50%;
      transform: translateX(-50%) translateY(-4px);
      max-width: 340px; padding: 10px 16px; text-align: center;
      opacity: 0; transition: opacity 0.18s, transform 0.18s; pointer-events: none;
    }
    .viz-hover.is-on { opacity: 1; transform: translateX(-50%) translateY(0); }
    .viz-hover-name {
      font-family: var(--font-mono); font-size: 15px;
      color: var(--accent-bright); letter-spacing: 0.04em;
      text-shadow: 0 0 14px oklch(0.94 var(--accent-c) var(--accent-h) / 0.45);
      margin-bottom: 4px;
    }
    .viz-hover-meta { font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--fg-mute); display: flex; gap: 8px; justify-content: center; align-items: baseline; }
    .viz-hover-pct { color: var(--accent); font-variant-numeric: tabular-nums; }
    .viz-hover-sep { color: var(--fg-faint); }
    .viz-hover-desc { margin-top: 8px; font-size: var(--fs-sm); color: var(--fg-mute); font-style: italic; max-width: 320px; text-wrap: pretty; }
    .viz-hover-hint { font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--fg-faint); letter-spacing: 0.04em; }

    /* Analysis panel */
    .analysis { display: flex; flex-direction: column; height: 100%; min-height: 0; }
    .ana-tabs {
      display: flex; border-bottom: 1px solid var(--line-soft);
      padding: 0 var(--pad); gap: 2px;
    }
    .ana-tab {
      appearance: none; background: none; border: 0;
      padding: 9px 10px 9px; font-family: var(--font-mono); font-size: var(--fs-xs);
      color: var(--fg-mute); cursor: pointer;
      text-transform: uppercase; letter-spacing: 0.12em;
      border-bottom: 1.5px solid transparent; margin-bottom: -1px;
      transition: all 0.12s;
    }
    .ana-tab:hover { color: var(--fg); }
    .ana-tab.is-active { color: var(--accent); border-bottom-color: var(--accent); }

    .ana-section { flex: 1; overflow-y: auto; min-height: 0; padding-bottom: 8px; }
    .ana-section + .ana-section { border-top: 1px solid var(--line-soft); }
    .ana-section-hd {
      padding: 14px var(--pad) 8px;
      font-family: var(--font-mono); font-size: var(--fs-xs);
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .ana-section-title { color: var(--accent); text-transform: uppercase; letter-spacing: 0.16em; }
    .ana-section-sub { color: var(--fg-faint); font-size: 10px; }
    .ana-list { padding: 0 var(--pad); display: flex; flex-direction: column; gap: 6px; }
    .ana-row {
      display: flex; gap: 10px; padding: 10px 12px;
      border: 1px solid var(--line-soft); border-radius: 4px;
      background: oklch(0.11 0 0 / 0.5); transition: all 0.12s;
    }
    .ana-row:hover { border-color: var(--accent-dim); background: oklch(0.14 0 0 / 0.7); }
    .ana-row-bot { cursor: pointer; }
    .ana-check { appearance: none; background: none; border: 0; padding: 0; cursor: pointer; align-self: flex-start; margin-top: 2px; }
    .ana-check-box { display: inline-block; width: 12px; height: 12px; border: 1px solid var(--accent-dim); border-radius: 2px; transition: all 0.12s; }
    .ana-check:hover .ana-check-box { background: var(--accent-ghost); border-color: var(--accent); }
    .ana-row-body { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .ana-row-top { display: flex; gap: 8px; align-items: baseline; }
    .ana-name { flex: 1; color: var(--fg); font-size: var(--fs-sm); }
    .ana-gain { color: var(--accent); font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: var(--fs-xs); }
    .ana-gain.warn { color: var(--warn); }
    .ana-row-meta { display: flex; justify-content: space-between; gap: 8px; font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--fg-dim); }
    .ana-path { cursor: pointer; }
    .ana-path:hover { color: var(--accent); }
    .ana-stats { display: flex; gap: 10px; font-variant-numeric: tabular-nums; align-items: baseline; }
    .ana-edit { appearance: none; background: none; border: 0; color: var(--fg-dim); font: inherit; cursor: pointer; padding: 0; font-family: var(--font-mono); font-size: var(--fs-xs); text-decoration: underline; text-decoration-color: var(--line); text-underline-offset: 2px; }
    .ana-edit:hover { color: var(--accent); text-decoration-color: var(--accent); }
    .ana-bar { height: 2px; background: var(--bg-3); border-radius: 1px; overflow: hidden; margin-top: 2px; }
    .ana-bar-fill { height: 100%; background: var(--accent); box-shadow: 0 0 6px oklch(0.94 var(--accent-c) var(--accent-h) / 0.4); transition: width 0.3s; }
    .ana-bar-fill.warn { background: var(--warn); box-shadow: 0 0 6px oklch(0.80 0.14 55 / 0.5); }
    .ana-empty { color: var(--fg-faint); font-family: var(--font-mono); font-size: var(--fs-xs); padding: 8px 12px; font-style: italic; }

    /* Weekly view */
    .weekly-list { padding: 10px var(--pad); display: flex; flex-direction: column; gap: 6px; }
    .weekly-row {
      display: flex; gap: 10px; padding: 10px 12px;
      border: 1px solid var(--line-soft); border-radius: 4px;
      background: oklch(0.11 0 0 / 0.5); transition: all 0.12s; align-items: flex-start;
    }
    .weekly-row:hover { border-color: var(--line); }
    .weekly-row.is-done { opacity: 0.45; }
    .weekly-check { appearance: none; background: none; border: 0; padding: 0; cursor: pointer; flex-shrink: 0; margin-top: 1px; }
    .weekly-check-box {
      display: inline-block; width: 14px; height: 14px;
      border: 1px solid var(--accent-dim); border-radius: 3px;
      transition: all 0.12s; position: relative;
    }
    .weekly-check-box.is-done {
      background: var(--accent); border-color: var(--accent);
      box-shadow: 0 0 8px oklch(0.94 var(--accent-c) var(--accent-h) / 0.4);
    }
    .weekly-check-box.is-done::after {
      content: ""; position: absolute; left: 4px; top: 1px;
      width: 4px; height: 8px; border: solid var(--bg-0);
      border-width: 0 1.5px 1.5px 0; transform: rotate(45deg);
    }
    .weekly-body { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .weekly-top { display: flex; gap: 8px; align-items: baseline; }
    .weekly-name { flex: 1; color: var(--fg); font-size: var(--fs-sm); }
    .weekly-name.done { text-decoration: line-through; color: var(--fg-dim); }
    .weekly-scores {
      display: flex; gap: 6px; align-items: center;
      font-family: var(--font-mono); font-size: var(--fs-xs);
      font-variant-numeric: tabular-nums;
    }
    .weekly-benefit { color: var(--accent); }
    .weekly-deficit { color: var(--warn); }
    .weekly-meta { display: flex; gap: 8px; font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--fg-dim); }
    .weekly-path { color: var(--fg-faint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .weekly-score-bar { height: 2px; background: var(--bg-3); border-radius: 1px; overflow: hidden; margin-top: 2px; position: relative; }
    .weekly-bar-benefit { position: absolute; left: 0; top: 0; height: 100%; background: var(--accent); opacity: 0.7; }
    .weekly-bar-deficit { position: absolute; top: 0; height: 100%; background: var(--warn); opacity: 0.7; }
    .weekly-hd { padding: 10px var(--pad) 6px; display: flex; gap: 8px; align-items: baseline; font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--fg-mute); }
    .weekly-hd-stat { color: var(--accent); }

    /* Status bar */
    .status {
      display: flex; align-items: center; gap: 14px;
      padding: 0 var(--pad); border-top: 1px solid var(--line-soft);
      background: oklch(0.07 0 0); font-family: var(--font-mono);
      font-size: var(--fs-xs); color: var(--fg-mute); letter-spacing: 0.04em;
    }
    .status-cell { display: flex; gap: 5px; align-items: baseline; }
    .status-sep { width: 1px; height: 10px; background: var(--line); }
    .status-spacer { flex: 1; }

    /* Modal */
    .modal-scrim {
      position: fixed; inset: 0; z-index: 100;
      background: oklch(0 0 0 / 0.7); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center; padding: 32px;
    }
    .modal {
      background: var(--bg-1); border: 1px solid var(--line); border-radius: 4px;
      max-width: 720px; width: 100%; max-height: 90vh; overflow: hidden;
      display: flex; flex-direction: column;
      box-shadow: 0 0 80px oklch(0.94 var(--accent-c) var(--accent-h) / 0.10), 0 24px 60px rgba(0,0,0,0.5);
    }
    .modal-hd {
      display: flex; align-items: baseline; gap: 10px;
      padding: 14px var(--pad); border-bottom: 1px solid var(--line-soft);
      font-family: var(--font-mono); font-size: var(--fs-sm);
    }
    .modal-hd-label { color: var(--fg-mute); text-transform: uppercase; letter-spacing: 0.16em; font-size: var(--fs-xs); }
    .modal-hd-name { color: var(--accent-bright); }

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current; if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    offsetRef.current = {
      x: Math.min(Math.max(PAD, window.innerWidth - w - PAD), Math.max(PAD, offsetRef.current.x)),
      y: Math.min(Math.max(PAD, window.innerHeight - h - PAD), Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);
  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clampToViewport) : null;
    if (ro) ro.observe(document.documentElement); else window.addEventListener('resize', clampToViewport);
    return () => { if (ro) ro.disconnect(); else window.removeEventListener('resize', clampToViewport); };
  }, [open, clampToViewport]);
  React.useEffect(() => {
    const onMsg = (e) => {
      if (e?.data?.type === '__activate_edit_mode') setOpen(true);
      else if (e?.data?.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };
  const onDragStart = (e) => {
    const panel = dragRef.current; if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right, startBottom = window.innerHeight - r.bottom;
    const move = (ev) => { offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) }; clampToViewport(); };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
  };

    <>

      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>

        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);

  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));

  };

    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (<button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>))}
      </div>
    </TweakRow>
  );

function TweakSelect({ label, value, options, onChange }) {
  return (<TweakRow label={label}><select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>{options.map((o) => { const v = typeof o === 'object' ? o.value : o; const l = typeof o === 'object' ? o.label : o; return <option key={v} value={v}>{l}</option>; })}</select></TweakRow>);

function resolveHue(path) {
  for (let i = path.length - 1; i >= 0; i--) {
    const h = path[i]?.color;
    if (h != null && !Number.isNaN(Number(h))) return Number(h);
  }
  return null;
}

function progressOf(node) {
  const tasks = node.tasks || [];
  const children = node.children || [];
  const taskMass = tasks.reduce((a, t) => a + t.impact, 0);
  const taskScore = tasks.reduce((a, t) => a + (t.done ? t.impact : 0), 0);
  const childMass = children.reduce((a, c) => a + c.weight, 0);
  const childScore = children.reduce((a, c) => a + c.weight * progressOf(c), 0);
  const total = taskMass + childMass;
  if (total === 0) return 0;
  return (taskScore + childScore) / total;
}

function findById(node, id, path = []) {
  if (node.id === id) return { node, path: [...path, node] };
  for (const c of node.children || []) {
    const r = findById(c, id, [...path, node]);
    if (r) return r;
  }
  return null;
}

function walkWeighted(root) {
  const out = [];
  const visit = (node, mult, path) => {
    out.push({ node, weight: mult, path });
    const childSum = (node.children || []).reduce((a, c) => a + c.weight, 0);
    for (const c of node.children || []) {
      const share = childSum > 0 ? c.weight / childSum : 0;
      visit(c, mult * share, [...path, c]);
    }
  };
  visit(root, 1, [root]);
  return out;
}

function bottlenecks(root, n = 5) {
  const all = walkWeighted(root);
  return all
    .filter(({ node }) => node !== root)
    .map((x) => ({ ...x, progress: progressOf(x.node), gap: x.weight * (1 - progressOf(x.node)) }))
    .filter((x) => x.gap > 0.001)
    .sort((a, b) => b.gap - a.gap)
    .slice(0, n);
}

function topTasks(root, n = 5) {
  const all = walkWeighted(root);
  const out = [];
  for (const { node, weight, path } of all) {
    const taskMass = (node.tasks || []).reduce((a, t) => a + t.impact, 0) || 1;
    for (const task of node.tasks || []) {
      if (task.done) continue;
      const rootGain = weight * (task.impact / taskMass);
      out.push({ task, node, path, rootGain, priority: rootGain / Math.max(1, task.effort) });
    }
  }
  out.sort((a, b) => b.priority - a.priority);
  return out.slice(0, n);
}

function weeklyTasks(root) {
  const out = [];
  const visit = (node, path) => {
    for (const t of node.tasks || []) {
      if (t.weekly) out.push({ task: t, node, path: [...path, node] });
    }
    for (const c of node.children || []) visit(c, [...path, node]);
  };
  visit(root, []);
  out.sort((a, b) => (b.task.benefit + b.task.deficit) - (a.task.benefit + a.task.deficit));
  return out;
}

function mapTree(node, fn) {
  const mapped = fn(node) || node;
  if (mapped.children) return { ...mapped, children: mapped.children.map((c) => mapTree(c, fn)) };
  return mapped;
}
function updateNode(root, id, updater) { return mapTree(root, (n) => (n.id === id ? { ...n, ...updater(n) } : n)); }
function toggleTask(root, taskId) {
  return mapTree(root, (n) => {
    if (!n.tasks || !n.tasks.some((t) => t.id === taskId)) return n;
    return { ...n, tasks: n.tasks.map((t) => (t.id === taskId ? { ...t, done: !t.done } : t)) };
  });
}
function toggleWeeklyDone(root, taskId) {
  return mapTree(root, (n) => {
    if (!n.tasks || !n.tasks.some((t) => t.id === taskId)) return n;
    return { ...n, tasks: n.tasks.map((t) => (t.id === taskId ? { ...t, weeklyDone: !t.weeklyDone } : t)) };
  });
}
function addChild(root, parentId, child) { return mapTree(root, (n) => (n.id === parentId ? { ...n, children: [...(n.children || []), child] } : n)); }
function addTask(root, identityId, task) { return mapTree(root, (n) => (n.id === identityId ? { ...n, tasks: [...(n.tasks || []), task] } : n)); }
function removeNode(root, id) {
  if (root.id === id) return root;
  return mapTree(root, (n) => (n.children ? { ...n, children: n.children.filter((c) => c.id !== id) } : n));
}
function removeTask(root, taskId) { return mapTree(root, (n) => (n.tasks ? { ...n, tasks: n.tasks.filter((t) => t.id !== taskId) } : n)); }

/* ── viz ──────────────────────────────────────────────────────────────────── */

const TAU = Math.PI * 2;
const toRad = (deg) => (deg * Math.PI) / 180;

function polar(r, deg) { const a = toRad(deg); return [r * Math.cos(a), r * Math.sin(a)]; }

function ringArc(rIn, rOut, a0, a1) {
  if (a1 - a0 < 0.01) return "";
  const large = a1 - a0 > 180 ? 1 : 0;
  const [x1, y1] = polar(rOut, a0), [x2, y2] = polar(rOut, a1);
  const [x3, y3] = polar(rIn, a1), [x4, y4] = polar(rIn, a0);
  return [`M ${x1.toFixed(2)} ${y1.toFixed(2)}`, `A ${rOut} ${rOut} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)}`, `L ${x3.toFixed(2)} ${y3.toFixed(2)}`, `A ${rIn} ${rIn} 0 ${large} 0 ${x4.toFixed(2)} ${y4.toFixed(2)}`, "Z"].join(" ");
}

// Compute stroke color for a wedge.
// urgency = (1 - progress) * normalizedWeight — high = less complete AND more weight.
// Color intensity is highest for most urgent wedges.
function wedgeStroke(hue, progress, urgency, accentH, accentC, isHov, isDim) {
  const urg = Math.max(0, Math.min(1, urgency));
  const h = hue !== null ? hue : accentH;
  // Chroma: for a node with its own hue, always use some color. Accent-only nodes scale with accent-c.
  const baseChroma = hue !== null ? 0.06 : Math.max(0, accentC);
  const chroma = baseChroma + urg * 0.20;
  // Lightness: dimmer when complete (less urgent), brighter when urgent
  const L = 0.45 + urg * 0.42;
  // Opacity
  let op = 0.15 + urg * 0.72;
  if (isDim) op = 0.07;
  if (isHov) { op = 1.0; }
  const color = `oklch(${L.toFixed(3)} ${chroma.toFixed(3)} ${h})`;
  return { color, opacity: op };
}

function CoreViz({ focus, focusPath, onSelect, pulseSpeed = "med", showFragments = true, accentH = 240, accentC = 0 }) {
  const [hover, setHover] = React.useState(null);
  const [hoverKind, setHoverKind] = React.useState(null);

  const children = focus.children || [];
  const totalW = children.reduce((a, c) => a + c.weight, 0) || 1;
  const overall = progressOf(focus);

  const ringIn = 100, ringOut = 144, outerIn = 156, outerOut = 178, coreR = 78;
  const GAP_DEG = children.length > 1 ? 2.5 : 0;
  const SUB_GAP_DEG = 0.8;
  const usable = 360 - GAP_DEG * children.length;

  let cursor = -90 + GAP_DEG / 2;
  const slices = children.map((c) => {
    const span = (c.weight / totalW) * usable;
    const a0 = cursor, a1 = cursor + span;
    cursor = a1 + GAP_DEG;
    const prog = progressOf(c);
    const nw = c.weight / totalW; // normalized weight within focus

    const gcs = c.children || [];
    const gcTotalW = gcs.reduce((a, g) => a + g.weight, 0) || 1;
    const gcGapCount = Math.max(0, gcs.length - 1);
    const gcUsable = span - SUB_GAP_DEG * gcGapCount;
    let gcCursor = a0;
    const gcSlices = gcs.map((g) => {
      const gSpan = (g.weight / gcTotalW) * gcUsable;
      const g0 = gcCursor, g1 = gcCursor + gSpan;
      gcCursor = g1 + SUB_GAP_DEG;
      return { node: g, a0: g0, a1: g1, prog: progressOf(g), nw: (g.weight / gcTotalW) * nw * 0.6 };
    });

    return { node: c, a0, a1, prog, mid: (a0 + a1) / 2, span, nw, gcSlices };
  });

  let hoverNode = null, hoverParent = null, hoverProg = null;
  if (hover) {
    const slice = slices.find((s) => s.node.id === hover);
    if (slice) { hoverNode = slice.node; hoverProg = slice.prog; }
    else {
      for (const s of slices) {
        const g = s.gcSlices.find((gs) => gs.node.id === hover);
        if (g) { hoverNode = g.node; hoverParent = s.node; hoverProg = g.prog; break; }
      }
    }
  }

  const pulseDur = { slow: "5.4s", med: "3.6s", fast: "2.2s" }[pulseSpeed] || "3.6s";

  // Overall core stroke color
  const coreL = 0.50 + overall * 0.40;
  const coreC = accentC > 0 ? accentC : (overall > 0.5 ? 0.05 : 0.02);
  const coreStroke = `oklch(${coreL.toFixed(3)} ${coreC.toFixed(3)} ${accentH})`;

  return (
    <div className="viz-wrap" style={{ "--pulse-dur": pulseDur }}
         onMouseLeave={() => { setHover(null); setHoverKind(null); }}>
      <svg viewBox="-220 -220 440 440" className="viz-svg" role="img" aria-label="identity core">
        <defs>
          <radialGradient id="g-core" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0%" stopColor={`oklch(0.94 ${accentC} ${accentH})`} stopOpacity="0.35" />
            <stop offset="55%" stopColor={`oklch(0.94 ${accentC} ${accentH})`} stopOpacity="0.06" />
            <stop offset="100%" stopColor={`oklch(0.94 ${accentC} ${accentH})`} stopOpacity="0" />
          </radialGradient>
          <radialGradient id="g-halo" cx="0.5" cy="0.5" r="0.5">
            <stop offset="50%" stopColor={`oklch(0.94 ${accentC} ${accentH})`} stopOpacity="0" />
            <stop offset="80%" stopColor={`oklch(0.94 ${accentC} ${accentH})`} stopOpacity="0.03" />
            <stop offset="100%" stopColor={`oklch(0.94 ${accentC} ${accentH})`} stopOpacity="0" />
          </radialGradient>
          <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="3" result="b" />
            <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
          </filter>
          <filter id="glow-strong" x="-70%" y="-70%" width="240%" height="240%">
            <feGaussianBlur stdDeviation="6" result="b" />
            <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
          </filter>
          <filter id="glow-core" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="b" />
            <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
          </filter>
        </defs>

        {/* Ambient halo */}
        <circle r={outerOut + 30} fill="url(#g-halo)" className="viz-pulse" />

        {/* Inner-ring wedges — outline only, urgency-colored */}
        {slices.map((s) => {
          const isHov = hover === s.node.id;
          const isParentOfHov = hoverParent && hoverParent.id === s.node.id;
          const isDim = hover !== null && !isHov && !isParentOfHov;
          const urgency = (1 - s.prog) * s.nw;
          const hue = resolveHue([...focusPath, s.node]);
          const { color, opacity } = wedgeStroke(hue, s.prog, urgency, accentH, accentC, isHov, isDim);
          return (
            <g key={s.node.id} className="viz-slice"
               onMouseEnter={() => { setHover(s.node.id); setHoverKind("slice"); }}
               onClick={() => onSelect(s.node.id)}>
              <path d={ringArc(ringIn, ringOut, s.a0, s.a1)}
                    fill="none"
                    style={{ stroke: color, strokeOpacity: opacity, strokeWidth: isHov ? 1.6 : 1.2 }}
                    filter={isHov ? "url(#glow-strong)" : (urgency > 0.2 ? "url(#glow)" : undefined)} />
            </g>
          );
        })}

        {/* Outer-ring grandchild wedges */}
        {showFragments && slices.map((s) => s.gcSlices.map((g) => {
          const isHov = hover === g.node.id;
          const isParentHov = hover === s.node.id;
          const isDim = hover !== null && !isHov && !isParentHov;
          const urgency = (1 - g.prog) * g.nw;
          const hue = resolveHue([...focusPath, s.node, g.node]);
          const { color, opacity } = wedgeStroke(hue, g.prog, urgency, accentH, accentC, isHov, isDim);
          return (
            <g key={`${s.node.id}-${g.node.id}`} className="viz-frag"
               onMouseEnter={(e) => { e.stopPropagation(); setHover(g.node.id); setHoverKind("frag"); }}
               onClick={(e) => { e.stopPropagation(); onSelect(g.node.id); }}>
              <path d={ringArc(outerIn, outerOut, g.a0, g.a1)}
                    fill="none"
                    style={{ stroke: color, strokeOpacity: opacity, strokeWidth: isHov ? 1.2 : 0.9 }}
                    filter={isHov ? "url(#glow-strong)" : (urgency > 0.15 ? "url(#glow)" : undefined)} />
            </g>
          );
        }))}

        {/* Core orb */}
        <circle r={coreR + 18} fill="url(#g-core)" className="viz-pulse-strong" />
        <circle r={coreR} fill="var(--bg-2)"
                style={{ stroke: coreStroke, strokeOpacity: 0.35, strokeWidth: 0.8 }} />
        {/* Progress arc overlay */}
        <circle r={coreR} fill="none"
                style={{ stroke: coreStroke, strokeOpacity: 0.75, strokeWidth: 1.8 }}
                strokeDasharray={`${(overall * TAU * coreR).toFixed(1)} ${(TAU * coreR).toFixed(1)}`}
                transform="rotate(-90)"
                filter="url(#glow-core)" />

        <text className="viz-core-pct" textAnchor="middle" y="-2" fontSize="24">
          {(overall * 100).toFixed(1)}%
        </text>
        <text className="viz-core-name" textAnchor="middle" y="18" fontSize="9.5">
          {focus.name}
        </text>
      </svg>

      <div className={`viz-hover ${hoverNode ? "is-on" : ""}`}>
        {hoverNode ? (
          <>
            <div className="viz-hover-name">{hoverNode.name}</div>
            <div className="viz-hover-meta">
              <span className="viz-hover-pct">{(hoverProg * 100).toFixed(1)}%</span>
              <span className="viz-hover-sep">·</span>
              <span>{hoverParent ? `under ${hoverParent.name}` : `weight ${hoverNode.weight}`}</span>
            </div>
            {hoverNode.description && <div className="viz-hover-desc">{hoverNode.description}</div>}
          </>
        ) : (
          <div className="viz-hover-hint">hover · click to focus</div>
        )}
      </div>
    </div>
  );
}

function countNodes(n) { return 1 + (n.children || []).reduce((a, c) => a + countNodes(c), 0); }

function IdentityTree({ root, focusId, expanded, onToggleExpand, onFocus }) {
  const renderNode = (node, depth = 0) => {
    const open = expanded.has(node.id);
    const kids = node.children || [];
    const hasKids = kids.length > 0;
    const prog = progressOf(node);
    const isFocus = focusId === node.id;
    const hue = node.color != null ? node.color : null;
    const dotColor = hue !== null ? `oklch(0.70 0.18 ${hue})` : "var(--fg-faint)";

    return (
      <React.Fragment key={node.id}>
        <div className={`tree-row${isFocus ? " is-focus" : ""}`}
             style={{ paddingLeft: `${8 + depth * 14}px` }}
             onClick={() => onFocus(node.id)}>
          <button className="tree-disc"
                  onClick={(e) => { e.stopPropagation(); if (hasKids) onToggleExpand(node.id); }}
                  aria-label={hasKids ? (open ? "collapse" : "expand") : "leaf"}>
            {hasKids ? (open ? "−" : "+") : "·"}
          </button>
          {hue !== null && <span className="tree-dot" style={{ background: dotColor }} />}
          <span className="tree-name">{node.name}</span>
          <span className="tree-pct">{(prog * 100).toFixed(0)}<span className="tree-pct-unit">%</span></span>
        </div>
        {open && hasKids && kids.map((c) => renderNode(c, depth + 1))}
      </React.Fragment>
    );
  };
  return (
    <div className="tree">
      <div className="pane-hd">
        <span className="pane-hd-name">identities</span>
        <span className="pane-hd-meta">{countNodes(root)}</span>
      </div>
      <div className="tree-body">{renderNode(root)}</div>
    </div>
  );
}

function WeeklyView({ root, onToggleWeeklyDone }) {
  const items = weeklyTasks(root);
  const done = items.filter((x) => x.task.weeklyDone).length;
  const maxScore = items.length > 0 ? items[0].task.benefit + items[0].task.deficit : 1;

  return (
    <div className="ana-section" style={{ overflowY: "auto" }}>
      <div className="weekly-hd">
        <span>this week</span>
        <span className="weekly-hd-stat">{done}/{items.length}</span>
        <span style={{ color: "var(--fg-faint)", marginLeft: "auto" }}>benefit · deficit</span>
      </div>
      <div className="weekly-list">
        {items.length === 0 && <div className="ana-empty">no weekly habits yet — mark tasks as weekly in the editor</div>}
        {items.map(({ task, node, path }) => {
          const score = task.benefit + task.deficit;
          const benefitPct = (task.benefit / score) * (score / maxScore) * 100;
          const deficitPct = (task.deficit / score) * (score / maxScore) * 100;
          return (
            <div key={task.id} className={`weekly-row ${task.weeklyDone ? "is-done" : ""}`}>
              <button className="weekly-check" onClick={() => onToggleWeeklyDone(task.id)}>

                </div>

          );
        })}

  );
}

          <div className="ana-section-hd">
            <span className="ana-section-title">leverage</span>
            <span className="ana-section-sub">impact × weight ÷ effort</span>
          </div>
          <div className="ana-list">
            {tasks.length === 0 && <div className="ana-empty">no open tasks in scope</div>}
            {tasks.map((t) => (
              <div key={t.task.id} className="ana-row">
                <button className="ana-check" onClick={() => onToggleTask(t.task.id)}>
                  <span className="ana-check-box" />
                </button>
                <div className="ana-row-body">
                  <div className="ana-row-top">
                    <span className="ana-name">{t.task.name}</span>
                    <span className="ana-gain">+{(t.rootGain * 100).toFixed(1)}%</span>
                  </div>
                  <div className="ana-row-meta">
                    <span className="ana-path" onClick={() => onSelectIdentity(t.node.id)}>
                      {t.path.slice(1).map((n) => n.name).join(" / ") || t.node.name}
                    </span>
                    <span className="ana-stats"><span>i{t.task.impact}</span><span>e{t.task.effort}</span></span>
                  </div>
                  <div className="ana-bar"><div className="ana-bar-fill" style={{ width: `${Math.min(100, t.priority * 250)}%` }} /></div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {view === "bottlenecks" && (
        <div className="ana-section">
          <div className="ana-section-hd">
            <span className="ana-section-title">bottlenecks</span>
            <span className="ana-section-sub">weight × gap</span>
          </div>
          <div className="ana-list">
            {bot.length === 0 && <div className="ana-empty">no bottlenecks in scope</div>}
            {bot.map((b) => (
              <div key={b.node.id} className="ana-row ana-row-bot" onClick={() => onSelectIdentity(b.node.id)}>
                <div className="ana-row-body">
                  <div className="ana-row-top">
                    <span className="ana-name">{b.node.name}</span>
                    <span className="ana-gain warn">{(b.gap * 100).toFixed(1)}%</span>
                  </div>
                  <div className="ana-row-meta">
                    <span className="ana-path">{b.path.slice(1).map((n) => n.name).join(" / ") || "—"}</span>
                    <span className="ana-stats">
                      <span>w{(b.weight * 100).toFixed(1)}%</span>
                      <button className="ana-edit" onClick={(e) => { e.stopPropagation(); onOpenIdentity(b.node.id); }}>edit</button>
                    </span>
                  </div>
                  <div className="ana-bar"><div className="ana-bar-fill warn" style={{ width: `${(b.progress * 100).toFixed(1)}%` }} /></div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function IdentityModal({ root, node, onClose, onUpdate, onAddChild, onAddTask, onRemove, onRemoveTask, onToggleTask, onFocus }) {
  const [name, setName] = React.useState(node.name);
  const [description, setDescription] = React.useState(node.description || "");
  const [weight, setWeight] = React.useState(node.weight);
  React.useEffect(() => {
    setName(node.name); setDescription(node.description || ""); setWeight(node.weight);
  }, [node.id]);

  const [newChild, setNewChild] = React.useState({ name: "", weight: 20 });
  const [newTask, setNewTask] = React.useState({ name: "", impact: 7, effort: 3, weekly: false, benefit: 7, deficit: 5 });

  const prog = progressOf(node);
  const isRoot = node.id === root.id;
  const commit = () => onUpdate(node.id, () => ({ name, description, weight: Number(weight) || 0 }));

  const setColor = (hue) => onUpdate(node.id, () => ({ color: hue }));

  return (
    <div className="modal-scrim" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-hd">
          <span className="modal-hd-label">identity</span>
          <span className="modal-hd-name">{node.name}</span>
          <button className="modal-x" onClick={onClose}>✕</button>
        </div>

        <div className="modal-body">
          <div className="modal-grid">
            <div className="fld">
              <label>name</label>
              <input value={name} onChange={(e) => setName(e.target.value)} onBlur={commit} className="inp" />
            </div>
            <div className="fld">
              <label>weight <span className="dim">{!isRoot && "(within parent)"}</span></label>
              <input type="number" value={weight} disabled={isRoot}
                     onChange={(e) => setWeight(e.target.value)} onBlur={commit} className="inp" />
            </div>
            <div className="fld fld-wide">
              <label>description</label>
              <textarea value={description} onChange={(e) => setDescription(e.target.value)} onBlur={commit} rows={2} className="inp" />
            </div>
            <div className="fld">
              <label>progress</label>
              <div className="meter">
                <div className="meter-bar"><div className="meter-fill" style={{ width: `${prog * 100}%` }} /></div>
                <span className="meter-val">{(prog * 100).toFixed(1)}%</span>
              </div>
            </div>
            <div className="fld">
              <label>actions</label>
              <div className="actions">
                <button className="btn" onClick={() => onFocus(node.id)}>focus</button>
                {!isRoot && (
                  <button className="btn warn" onClick={() => { if (confirm(`remove ${node.name}?`)) { onRemove(node.id); onClose(); } }}>remove</button>
                )}
              </div>
            </div>
          </div>

          {/* Color picker */}
          <div className="modal-section">
            <div className="modal-section-hd">
              <span>color</span>
              <span className="dim">inherits from parent if unset</span>
            </div>
            <div className="hue-chips">
              <button
                className={`hue-chip hue-chip-none ${node.color == null ? "is-sel" : ""}`}
                title="inherit"
                onClick={() => setColor(null)}>
                —
              </button>
              {HUE_PALETTE.map(({ name: n, hue }) => (
                <button
                  key={hue}
                  className={`hue-chip ${node.color === hue ? "is-sel" : ""}`}
                  style={{ background: `oklch(0.65 0.18 ${hue})`, borderColor: node.color === hue ? "white" : "transparent" }}
                  title={n}
                  onClick={() => setColor(hue)}
                />
              ))}
            </div>
          </div>

          {/* Sub-identities */}
          <div className="modal-section">
            <div className="modal-section-hd">
              <span>sub-identities</span>
              <span className="dim">{(node.children || []).length}</span>
            </div>
            <div className="rowlist">
              {(node.children || []).map((c) => {
                const cp = progressOf(c);
                return (
                  <div className="rl-row" key={c.id}>
                    {c.color != null && <span style={{ width: 8, height: 8, borderRadius: "50%", background: `oklch(0.70 0.18 ${c.color})`, flexShrink: 0 }} />}
                    <span className="rl-name" onClick={() => onFocus(c.id)}>{c.name}</span>
                    <span className="dim small">w{c.weight}</span>
                    <div className="rl-bar"><div className="rl-bar-fill" style={{ width: `${cp * 100}%` }} /></div>
                    <span className="rl-pct">{(cp * 100).toFixed(0)}%</span>
                    <button className="iconbtn" onClick={() => { if (confirm(`remove ${c.name}?`)) onRemove(c.id); }}>×</button>
                  </div>
                );
              })}
            </div>
            <div className="addrow">
              <input className="inp inp-sm" placeholder="new sub-identity" value={newChild.name}
                     onChange={(e) => setNewChild({ ...newChild, name: e.target.value })} />
              <input type="number" className="inp inp-sm" placeholder="w" style={{ width: 60 }}
                     value={newChild.weight} onChange={(e) => setNewChild({ ...newChild, weight: Number(e.target.value) })} />
              <button className="btn" disabled={!newChild.name.trim()}
                      onClick={() => {
                        const id = `${node.id}.${newChild.name.trim().toLowerCase().replace(/\s+/g, "_")}.${Date.now().toString(36).slice(-4)}`;
                        onAddChild(node.id, { id, name: newChild.name.trim(), description: "", weight: newChild.weight, children: [], tasks: [] });
                        setNewChild({ name: "", weight: 20 });
                      }}>add</button>
            </div>
          </div>

          {/* Tasks */}
          <div className="modal-section">
            <div className="modal-section-hd">
              <span>tasks</span>
              <span className="dim">{(node.tasks || []).filter((t) => !t.done).length} open · {(node.tasks || []).length} total</span>
            </div>
            <div className="rowlist">
              {(node.tasks || []).map((t) => (
                <div className="rl-row" key={t.id}>
                  <button className="rl-check" onClick={() => onToggleTask(t.id)}>
                    <span className={`rl-check-box ${t.done ? "is-done" : ""}`} />
                  </button>
                  <span className={`rl-name ${t.done ? "done" : ""}`}>{t.name}</span>
                  {t.weekly && <span className="rl-weekly">↺ weekly</span>}
                  <span className="dim small">i{t.impact} e{t.effort}</span>
                  <button className="iconbtn" onClick={() => onRemoveTask(t.id)}>×</button>
                </div>
              ))}
              {(node.tasks || []).length === 0 && <div className="ana-empty">no tasks yet</div>}
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6, paddingTop: 4 }}>
              <div className="addrow">
                <input className="inp inp-sm" placeholder="new task" value={newTask.name}
                       onChange={(e) => setNewTask({ ...newTask, name: e.target.value })} />
                <input type="number" className="inp inp-sm" placeholder="i" min={1} max={10} style={{ width: 44 }}
                       value={newTask.impact} onChange={(e) => setNewTask({ ...newTask, impact: Number(e.target.value) })} />
                <input type="number" className="inp inp-sm" placeholder="e" min={1} max={10} style={{ width: 44 }}
                       value={newTask.effort} onChange={(e) => setNewTask({ ...newTask, effort: Number(e.target.value) })} />
                <button className="btn" disabled={!newTask.name.trim()}
                        onClick={() => {
                          const id = `t.${Date.now().toString(36)}`;
                          onAddTask(node.id, { id, name: newTask.name.trim(), impact: newTask.impact, effort: newTask.effort, done: false, weekly: newTask.weekly, benefit: newTask.benefit, deficit: newTask.deficit, weeklyDone: false });
                          setNewTask({ name: "", impact: 7, effort: 3, weekly: false, benefit: 7, deficit: 5 });
                        }}>add</button>
              </div>
              <div style={{ display: "flex", gap: 10, alignItems: "center", paddingLeft: 0 }}>
                <label style={{ display: "flex", gap: 6, alignItems: "center", cursor: "pointer", fontSize: "var(--fs-xs)", color: "var(--fg-mute)", fontFamily: "var(--font-mono)" }}>
                  <input type="checkbox" checked={newTask.weekly} onChange={(e) => setNewTask({ ...newTask, weekly: e.target.checked })}
                         style={{ accentColor: "var(--accent)" }} />
                  weekly habit
                </label>
                {newTask.weekly && (
                  <>
                    <label style={{ display: "flex", gap: 4, alignItems: "center", fontSize: "var(--fs-xs)", color: "var(--fg-mute)", fontFamily: "var(--font-mono)" }}>
                      benefit
                      <input type="number" min={1} max={10} value={newTask.benefit}
                             onChange={(e) => setNewTask({ ...newTask, benefit: Number(e.target.value) })}
                             className="inp inp-sm" style={{ width: 48 }} />
                    </label>
                    <label style={{ display: "flex", gap: 4, alignItems: "center", fontSize: "var(--fs-xs)", color: "var(--fg-mute)", fontFamily: "var(--font-mono)" }}>
                      deficit
                      <input type="number" min={1} max={10} value={newTask.deficit}
                             onChange={(e) => setNewTask({ ...newTask, deficit: Number(e.target.value) })}
                             className="inp inp-sm" style={{ width: 48 }} />
                    </label>
                  </>
                )}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── app ──────────────────────────────────────────────────────────────────── */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "neutral",
  "pulseSpeed": "med",
  "scanlines": false,
  "noise": false,
  "showFragments": true,
  "vignette": true,
  "density": "regular"
}/*EDITMODE-END*/;

const ACCENTS = {
  neutral:  { hue: 240, chroma: 0.000 },
  ice:      { hue: 230, chroma: 0.020 },
  phosphor: { hue: 145, chroma: 0.130 },
  amber:    { hue: 75,  chroma: 0.120 },
  cyan:     { hue: 200, chroma: 0.110 },
  magenta:  { hue: 320, chroma: 0.130 }
};

function applyAccent(name) {
  const a = ACCENTS[name] || ACCENTS.neutral;
  document.documentElement.style.setProperty("--accent-h", a.hue);
  document.documentElement.style.setProperty("--accent-c", a.chroma);
}

function useClock() {
  const [t, setT] = React.useState(() => new Date());
  React.useEffect(() => { const id = setInterval(() => setT(new Date()), 1000); return () => clearInterval(id); }, []);
  return t;
}

function StatusBar({ root, focus }) {
  const t = useClock();
  const totalTasks = (function tc(n) { return (n.tasks || []).length + (n.children || []).reduce((a, c) => a + tc(c), 0); })(root);
  const doneTasks = (function dc(n) { return (n.tasks || []).filter((x) => x.done).length + (n.children || []).reduce((a, c) => a + dc(c), 0); })(root);
  const overall = progressOf(root);
  const pad = (n) => String(n).padStart(2, "0");
  const time = `${pad(t.getHours())}:${pad(t.getMinutes())}`;
  return (
    <div className="status">
      <span className="status-cell"><span className="dim">root</span> <span className="accent">{(overall * 100).toFixed(2)}%</span></span>
      <span className="status-sep" />
      <span className="status-cell"><span className="dim">tasks</span> {doneTasks}/{totalTasks}</span>
      <span className="status-spacer" />
      <span className="status-cell"><span className="dim">scope</span> {focus.name}</span>
      <span className="status-sep" />
      <span className="status-cell mono-tight">{time}</span>
    </div>
  );
}

function Breadcrumb({ path, onJump }) {
  return (
    <div className="crumb">
      {path.map((n, i) => (
        <React.Fragment key={n.id}>
          {i > 0 && <span className="crumb-slash">/</span>}
          <button className={`crumb-seg${i === path.length - 1 ? " is-cur" : ""}`} onClick={() => onJump(n.id)}>{n.name}</button>
        </React.Fragment>
      ))}
    </div>
  );
}

function App() {
  const [root, setRoot] = React.useState(() => SEED_ROOT);
  const [focusId, setFocusId] = React.useState("root");
  const [expanded, setExpanded] = React.useState(() => new Set(["root", "craft", "body", "mind", "bond"]));
  const [editId, setEditId] = React.useState(null);
  const [leftOpen, setLeftOpen] = React.useState(true);
  const [rightOpen, setRightOpen] = React.useState(true);
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const accentVals = ACCENTS[t.accent] || ACCENTS.neutral;
  React.useEffect(() => { applyAccent(t.accent); }, [t.accent]);

  const found = findById(root, focusId) || findById(root, "root");
  const focus = found.node;
  const focusPath = found.path;
  const editNode = editId ? findById(root, editId)?.node : null;

  const handleFocus = (id) => {
    setFocusId(id);
    const f = findById(root, id);
    if (f) setExpanded((s) => new Set([...s, ...f.path.map((n) => n.id)]));
  };
  const handleToggleTask = (taskId) => setRoot((r) => toggleTask(r, taskId));
  const handleToggleWeeklyDone = (taskId) => setRoot((r) => toggleWeeklyDone(r, taskId));
  const handleAddChild = (parentId, child) => { setRoot((r) => addChild(r, parentId, child)); setExpanded((s) => new Set([...s, parentId])); };
  const handleAddTask = (id, task) => setRoot((r) => addTask(r, id, task));
  const handleUpdate = (id, updater) => setRoot((r) => updateNode(r, id, updater));
  const handleRemove = (id) => { setRoot((r) => removeNode(r, id)); if (focusId === id) setFocusId("root"); };
  const handleRemoveTask = (taskId) => setRoot((r) => removeTask(r, taskId));
  const toggleExpand = (id) => setExpanded((s) => { const n = new Set(s); if (n.has(id)) n.delete(id); else n.add(id); return n; });

  React.useEffect(() => {
    const onKey = (e) => {
      if (e.key === "Escape") setEditId(null);
      if (e.key === "Backspace" && !["INPUT", "TEXTAREA"].includes(document.activeElement.tagName)) {
        if (focusPath.length > 1) setFocusId(focusPath[focusPath.length - 2].id);
      }
      if (e.key === "[" && !["INPUT", "TEXTAREA"].includes(document.activeElement.tagName)) setLeftOpen((v) => !v);
      if (e.key === "]" && !["INPUT", "TEXTAREA"].includes(document.activeElement.tagName)) setRightOpen((v) => !v);
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [focusPath]);

  const mainCls = ["main", leftOpen ? "" : "no-left", rightOpen ? "" : "no-right"].filter(Boolean).join(" ");

  return (
    <div className={`app density-${t.density} ${t.scanlines ? "scanlines" : ""} ${t.noise ? "noise" : ""} ${t.vignette ? "vignette" : ""}`}>
      <header className="top">
        <div className="logo">
          <span className="logo-mark">◐</span>
          <span className="logo-name">gradatim</span>
        </div>
        <Breadcrumb path={focusPath} onJump={handleFocus} />
        <div className="top-actions">
          <button className="ghost-btn" onClick={() => setEditId(focus.id)}>edit</button>
        </div>
      </header>

      <main className={mainCls}>
        {leftOpen ? (
          <aside className="pane pane-l">
            <IdentityTree root={root} focusId={focusId} expanded={expanded} onToggleExpand={toggleExpand} onFocus={handleFocus} />
            <button className="pane-collapse left" onClick={() => setLeftOpen(false)} aria-label="hide identity tree" title="hide (key: [)">‹</button>
          </aside>
        ) : (
          <button className="pane-rail left" onClick={() => setLeftOpen(true)} aria-label="show identity tree">
            <span className="pane-rail-chev">›</span>
            <span className="pane-rail-label">identities</span>
          </button>
        )}

        <section className="pane pane-c">
          <CoreViz
            focus={focus}
            focusPath={focusPath}
            onSelect={handleFocus}
            pulseSpeed={t.pulseSpeed}
            showFragments={t.showFragments}
            accentH={accentVals.hue}
            accentC={accentVals.chroma}
          />
        </section>

        {rightOpen ? (
          <aside className="pane pane-r">
            <AnalysisPanel
              root={root}
              focus={focus}
              onSelectIdentity={handleFocus}
              onToggleTask={handleToggleTask}
              onOpenIdentity={(id) => setEditId(id)}
              onToggleWeeklyDone={handleToggleWeeklyDone}
            />
            <button className="pane-collapse right" onClick={() => setRightOpen(false)} aria-label="hide analysis" title="hide (key: ])">›</button>
          </aside>
        ) : (
          <button className="pane-rail right" onClick={() => setRightOpen(true)} aria-label="show analysis">
            <span className="pane-rail-chev">‹</span>
            <span className="pane-rail-label">analysis</span>
          </button>
        )}
      </main>

      <StatusBar root={root} focus={focus} />

      {editNode && (
        <IdentityModal
          root={root}
          node={editNode}
          onClose={() => setEditId(null)}
          onUpdate={handleUpdate}
          onAddChild={handleAddChild}
          onAddTask={handleAddTask}
          onRemove={handleRemove}
          onRemoveTask={handleRemoveTask}
          onToggleTask={handleToggleTask}
          onFocus={(id) => { handleFocus(id); setEditId(id); }}
        />
      )}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Aesthetic">
          <TweakSelect label="Accent" value={t.accent}
            options={["neutral", "ice", "phosphor", "amber", "cyan", "magenta"]}
            onChange={(v) => setTweak("accent", v)} />
          <TweakRadio label="Pulse" value={t.pulseSpeed}
            options={["slow", "med", "fast"]}
            onChange={(v) => setTweak("pulseSpeed", v)} />
          <TweakRadio label="Density" value={t.density}
            options={["compact", "regular", "comfy"]}
            onChange={(v) => setTweak("density", v)} />
        </TweakSection>
        <TweakSection label="Effects">
          <TweakToggle label="Scanlines" value={t.scanlines} onChange={(v) => setTweak("scanlines", v)} />
          <TweakToggle label="Noise" value={t.noise} onChange={(v) => setTweak("noise", v)} />
          <TweakToggle label="Vignette" value={t.vignette} onChange={(v) => setTweak("vignette", v)} />
        </TweakSection>
        <TweakSection label="Visualization">
          <TweakToggle label="Show fragments" value={t.showFragments} onChange={(v) => setTweak("showFragments", v)} />
        </TweakSection>
        <TweakSection label="Panes">
          <TweakToggle label="Identity tree" value={leftOpen} onChange={setLeftOpen} />
          <TweakToggle label="Analysis" value={rightOpen} onChange={setRightOpen} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
